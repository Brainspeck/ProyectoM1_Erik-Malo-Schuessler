<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main-container">
        <header>
            <h1>Colorfly Studio</h1>
        </header>

        <main>
            <section aria-labelledby="controls-title">
                <h2 id="controls-title">Opciones de generación</h2>

                <div class="controls">
                    <label for="palette-size">Cantidad de colores a generar:</label>
                    <select id="palette-size" name="palette-size">
                        <option value="6">6</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                    </select>

                    <label for="color-format">Selecciona el formato deseado:</label>
                    <select name="color-format" id="color-format">
                        <option value="hsl">HSL</option>
                        <option value="hex">HEX</option>
                    </select>

                    <button id="generate-btn">Generar paleta</button>

                    <p id="feedback" class="feedback" aria-live="polite"></p>
                </div>
            </section>

            <section 
                id="palette-container" 
                class="palette-container" 
                aria-label="Paleta de colores generada">
            </section>
        </main>

        <footer>
            <div class="made-by">
                <p class="author">Created by: Erik Schuessler</p>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>

</html>
